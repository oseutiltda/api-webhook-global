services:
  postgres:
    profiles: ["local-db"]
    image: postgres:16-alpine
    container_name: global-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-global_integrador}
      POSTGRES_USER: ${POSTGRES_USER:-global}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-global123}
    # Sem bind de porta no host para evitar conflito com PostgreSQL local já em 5432.
    # O acesso entre containers usa o hostname `postgres:5432`.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-global} -d ${POSTGRES_DB:-global_integrador}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # O Postgres precisa ajustar permissões no volume durante bootstrap.
    # Não aplicar cap_drop/cap_add aqui para evitar falha de inicialização.

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bmx-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-ALTERE_ESTE_SEGREDO}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-api-webhook-global@1.0.0}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.2}
      SENTRY_PROFILES_SAMPLE_RATE: ${SENTRY_PROFILES_SAMPLE_RATE:-0.1}
      # Banco de dados Senior (produção: SOFTRAN_BRASILMAXI, homologação: SOFTRAN_BRASILMAXI_HML)
      SENIOR_DATABASE: ${SENIOR_DATABASE:-SOFTRAN_BRASILMAXI}
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: "json-file"
      options:
        max-size: "5m"      # Tamanho máximo de cada arquivo de log (10MB)
        max-file: "3"        # Número máximo de arquivos de log (mantém apenas os 3 mais recentes)
        compress: "true"      # Comprimir logs antigos

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://globalcargo.afsgroup.com.br/api}
        NEXT_PUBLIC_ADMIN1_USER: ${NEXT_PUBLIC_ADMIN1_USER:-afs@afs}
        NEXT_PUBLIC_ADMIN1_PASSWORD: ${NEXT_PUBLIC_ADMIN1_PASSWORD:-afs123}
        NEXT_PUBLIC_ADMIN2_USER: ${NEXT_PUBLIC_ADMIN2_USER:-admin2@admin}
        NEXT_PUBLIC_ADMIN2_PASSWORD: ${NEXT_PUBLIC_ADMIN2_PASSWORD:-admin2#change-me}
    container_name: bmx-frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    ports:
      - "3001:3000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: "json-file"
      options:
        max-size: "10m"      # Tamanho máximo de cada arquivo de log (10MB)
        max-file: "3"        # Número máximo de arquivos de log (mantém apenas os 3 mais recentes)
        compress: "true"      # Comprimir logs antigos

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: bmx-worker
    restart: unless-stopped
    command: ["node", "dist/index.js"]
    depends_on:
      backend:
        condition: service_started
    env_file:
      - .env
    environment:
      NODE_ENV: production
      WORKER_INTERVAL_MS: ${WORKER_INTERVAL_MS:-5000}
      WORKER_BATCH_SIZE: ${WORKER_BATCH_SIZE:-10}
      WORKER_MAX_RETRIES: ${WORKER_MAX_RETRIES:-3}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-api-webhook-global@1.0.0}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.2}
      # Banco de dados Senior (produção: SOFTRAN_BRASILMAXI, homologação: SOFTRAN_BRASILMAXI_HML)
      SENIOR_DATABASE: ${SENIOR_DATABASE:-SOFTRAN_BRASILMAXI}
      NFSE_DESTINATION_DATABASE: ${NFSE_DESTINATION_DATABASE:-SOFTRAN_BRASILMAXI_HML}
      NFSE_SOURCE_DATABASE: ${NFSE_SOURCE_DATABASE:-AFS_INTEGRADOR}
      CIOT_WORKER_BATCH_SIZE: ${CIOT_WORKER_BATCH_SIZE:-3}
      CIOT_SOURCE_DATABASE: ${CIOT_SOURCE_DATABASE:-AFS_INTEGRADOR}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: "json-file"
      options:
        max-size: "10m"      # Tamanho máximo de cada arquivo de log (10MB)
        max-file: "3"        # Número máximo de arquivos de log (mantém apenas os 3 mais recentes)
        compress: "true"      # Comprimir logs antigos

  loki:
    profiles: ["observability"]
    image: grafana/loki:3.4.2
    container_name: global-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
      - ./observability/loki/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  promtail:
    profiles: ["observability"]
    image: grafana/promtail:3.4.2
    container_name: global-promtail
    restart: unless-stopped
    volumes:
      - ./observability/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:11.6.0
    container_name: global-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3002}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      loki:
        condition: service_healthy

volumes:
  postgres_data:
  loki_data:
  grafana_data:

