services:
  postgres:
    image: postgres:16-alpine
    container_name: global-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-global_integrador}
      POSTGRES_USER: ${POSTGRES_USER:-global}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-global123}
    # Sem bind de porta no host para evitar conflito com PostgreSQL local já em 5432.
    # O acesso entre containers usa o hostname `postgres:5432`.
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-global} -d ${POSTGRES_DB:-global_integrador}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # O Postgres precisa ajustar permissões no volume durante bootstrap.
    # Não aplicar cap_drop/cap_add aqui para evitar falha de inicialização.

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bmx-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-ALTERE_ESTE_SEGREDO}
      # Baseline local: PostgreSQL
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://${POSTGRES_USER:-global}:${POSTGRES_PASSWORD:-global123}@postgres:5432/${POSTGRES_DB:-global_integrador}?schema=public}
      # Banco de dados Senior (produção: SOFTRAN_BRASILMAXI, homologação: SOFTRAN_BRASILMAXI_HML)
      SENIOR_DATABASE: ${SENIOR_DATABASE:-SOFTRAN_BRASILMAXI}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: "json-file"
      options:
        max-size: "5m"      # Tamanho máximo de cada arquivo de log (10MB)
        max-file: "3"        # Número máximo de arquivos de log (mantém apenas os 3 mais recentes)
        compress: "true"      # Comprimir logs antigos

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://globalcargo.afsgroup.com.br/api}
        NEXT_PUBLIC_ADMIN1_USER: ${NEXT_PUBLIC_ADMIN1_USER:-afs@afs}
        NEXT_PUBLIC_ADMIN1_PASSWORD: ${NEXT_PUBLIC_ADMIN1_PASSWORD:-afs123}
        NEXT_PUBLIC_ADMIN2_USER: ${NEXT_PUBLIC_ADMIN2_USER:-admin2@admin}
        NEXT_PUBLIC_ADMIN2_PASSWORD: ${NEXT_PUBLIC_ADMIN2_PASSWORD:-admin2#change-me}
    container_name: bmx-frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
    ports:
      - "3001:3000"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: "json-file"
      options:
        max-size: "10m"      # Tamanho máximo de cada arquivo de log (10MB)
        max-file: "3"        # Número máximo de arquivos de log (mantém apenas os 3 mais recentes)
        compress: "true"      # Comprimir logs antigos

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: bmx-worker
    restart: unless-stopped
    command: ["node", "dist/index.js"]
    depends_on:
      backend:
        condition: service_started
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      # Baseline local: PostgreSQL (mesma URL do backend)
      DATABASE_URL: ${DATABASE_URL_DOCKER:-postgresql://${POSTGRES_USER:-global}:${POSTGRES_PASSWORD:-global123}@postgres:5432/${POSTGRES_DB:-global_integrador}?schema=public}
      WORKER_INTERVAL_MS: ${WORKER_INTERVAL_MS:-5000}
      WORKER_BATCH_SIZE: ${WORKER_BATCH_SIZE:-10}
      WORKER_MAX_RETRIES: ${WORKER_MAX_RETRIES:-3}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Banco de dados Senior (produção: SOFTRAN_BRASILMAXI, homologação: SOFTRAN_BRASILMAXI_HML)
      SENIOR_DATABASE: ${SENIOR_DATABASE:-SOFTRAN_BRASILMAXI}
      NFSE_DESTINATION_DATABASE: ${NFSE_DESTINATION_DATABASE:-SOFTRAN_BRASILMAXI_HML}
      NFSE_SOURCE_DATABASE: ${NFSE_SOURCE_DATABASE:-AFS_INTEGRADOR}
      CIOT_WORKER_BATCH_SIZE: ${CIOT_WORKER_BATCH_SIZE:-3}
      CIOT_SOURCE_DATABASE: ${CIOT_SOURCE_DATABASE:-AFS_INTEGRADOR}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: "json-file"
      options:
        max-size: "10m"      # Tamanho máximo de cada arquivo de log (10MB)
        max-file: "3"        # Número máximo de arquivos de log (mantém apenas os 3 mais recentes)
        compress: "true"      # Comprimir logs antigos

volumes:
  postgres_data:

